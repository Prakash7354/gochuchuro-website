---
layout: default
title: Insights
---
<section class="py-24 px-5 section-dark" style="min-height: 80vh;">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-16">
      <span class="inline-block text-sm font-black tracking-widest uppercase px-4 py-1.5 rounded-full mb-5 font-header" style="color:var(--holo-teal);border:1px solid rgba(0,181,200,0.3);background:rgba(0,181,200,0.06);">Blog & Articles</span>
      <h1 class="font-header text-4xl md:text-5xl font-bold mb-4">Latest Insights</h1>
      <p style="color:var(--text-dim);font-size:1.1rem;">Smart business systems, automation tips, and growth strategies for UK small businesses.</p>
      <div class="glow-line"></div>
    </div>

    <div class="grid gap-8">
      {% for post in site.posts %}
        <div class="panel-3d p-8">
          <span class="text-xs font-bold font-header" style="color: var(--holo-teal);">{{ post.date | date: "%B %d, %Y" }}</span>
          <h2 class="font-header text-2xl font-bold text-white mt-2 mb-3">
            <a href="{{ post.url | relative_url }}" style="color: white; text-decoration: none;" class="hover:text-gradient">{{ post.title }}</a>
          </h2>
          <p style="color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem;">{{ post.description }}</p>
          <a href="{{ post.url | relative_url }}" class="btn-3d" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">Read Article <i class="fa-solid fa-arrow-right"></i></a>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
