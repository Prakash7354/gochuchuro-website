<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarvahansh Travel | Pure Sky-High Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --sky-blue: #a3d8f4; /* Conceptually based on sky-high blue from image_12.png */
            --sky-path-blue: rgba(0, 181, 200, 0.6); /* Translucent, glowing blue for the path */
            --deep-maroon: #8A1538; /* Conceptually based on Qatar tail fin color */
            --bg-deep: #05070a; /* Darkest layer for deep space feel */
            
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); }

        .font-header { font-family: 'Playfair Display', serif; }

        /* --- THE 3D SCENE CONTAINER --- */
        #three-canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Behind the HTML content */
        }

        /* --- THE HTML OVERLAY LAYER --- */
        .html-overlay {
            position: relative;
            z-index: 10; /* In front of the 3D scene */
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            pointer-events: none; /* Let clicks pass through to background by default */
        }

        /* --- LUXURY GLASSMORPHISM NAV/CONTENT --- */
        header {
            background: rgba(5, 7, 10, 0.5); backdrop-filter: blur(15px);
            padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto; /* Enable clicks for navigation */
        }

        /* Glass Panel with Tilt for the Text */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            pointer-events: auto; /* Enable interaction */
        }

        /* --- TEXT STYLING --- */
        .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }
        .teal-gradient { background: linear-gradient(135deg, #FFF1CA, #00B5C8, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- BUTTONS --- */
        .btn-luxury {
            background: linear-gradient(135deg, #FFF1CA, #D4AF37); color: #000;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 800; font-size: 0.85rem;
            padding: 1rem 2.5rem; border-radius: 50px; transition: 0.4s;
            border: 1px solid #FFF1CA; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            pointer-events: auto;
        }
        .btn-luxury:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5); background: linear-gradient(135deg, #FFF1CA, #D4AF37); color: white;}
    </style>
</head>
<body>

    <div id="three-canvas-container"></div>

    <div class="html-overlay">
        
        <header class="w-full">
            <a href="#" class="flex flex-col">
                <span class="font-header text-2xl md:text-3xl font-bold tracking-widest text-white leading-none">
                    SARVAHANSH
                </span>
                <span class="font-body text-[10px] uppercase tracking-[0.3em] text-qatarGold mt-1">
                    Premium Travel Agent
                </span>
            </a>

            <nav class="flex gap-8 items-center">
                <a href="#" class="text-white text-sm font-semibold tracking-widest uppercase hover:text-qatarGold transition">Destinations</a>
                <a href="#" class="text-white text-sm font-semibold tracking-widest uppercase hover:text-qatarGold transition">First Class</a>
                <a href="#" class="border border-white/30 px-6 py-2 rounded-full text-white text-xs font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">Contact</a>
            </nav>
        </header>

        <main class="flex-1 flex items-center justify-center px-5">
            
            <div class="glass-panel p-16 max-w-4xl text-center w-full" data-tilt data-tilt-max="3" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
                
                <h1 class="font-header text-5xl md:text-7xl font-bold text-white mb-6 leading-tight text-glow">
                    Flying Memories of <br>
                    <span class="teal-gradient italic">A Lifetime.</span>
                }
                </h1>
                
                <p class="font-body text-xl text-gray-300 max-w-2xl mx-auto mb-10 leading-relaxed font-light">
                    Your direct "Sky Path" to unparalleled comfort. Architect seamless, bespoke transit experiences with Sarvahansh Travel.
                </p>

                <div class="flex flex-col sm:flex-row justify-center gap-5">
                    <a href="#" class="btn-luxury">Explore Your Sky Path</a>
                </div>

            </div>

        </main>
    </div>

    <script>
        // Setup the basic 3D structure
        const container = document.getElementById('three-canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2( 0xa3d8f4, 0.015 ); // Add deep sky fog

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10; camera.position.y = 2; // Position the camera inside the space

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00B5C8, 3, 100); // Glow from the sky path
        pointLight.position.set(0, 0, 5);
        scene.add(pointLight);

        // --- THE SKY PATH (The real 3D Jelly) ---
        // A translucent, glowing "river" flowing through the space
        const pathGeometry = new THREE.CylinderGeometry(2.5, 1.5, 100, 50, 50, true); // Create a tube
        pathGeometry.rotateX(-Math.PI / 2); // Lay it flat

        const pathMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x00B5C8, // Sky Path Blue
            metalness: 0.1, roughness: 0.1,
            transmission: 0.8, thickness: 1,
            transparent: true, opacity: 0.6, // Translucent "jelly" look
            wireframe: false,
            side: THREE.BackSide, // Look from the inside
        });

        const skyPath = new THREE.Mesh(pathGeometry, pathMaterial);
        skyPath.position.z = -30; skyPath.position.y = 1.5;
        scene.add(skyPath);

        // Store original vertices for animation
        const positions = skyPath.geometry.attributes.position;
        const originalY = new Float32Array(positions.count);
        for(let i = 0; i < positions.count; i++) {
            originalY[i] = positions.getY(i);
        }

        // --- THE CLOUD SEA (Layers of textures) ---
        const cloudTexture = new THREE.TextureLoader().load('image_12.png'); // Base texture
        const cloudMaterial = new THREE.MeshLambertMaterial({ map: cloudTexture, transparent: true, opacity: 0.8 });
        
        for ( let i = 0; i < 30; i ++ ) {
            const mesh = new THREE.Mesh( new THREE.PlaneGeometry(30, 30), cloudMaterial );
            mesh.position.x = Math.random() * 80 - 40;
            mesh.position.y = -5 - (Math.random() * 3); // Position them below the path
            mesh.position.z = Math.random() * -100 + 10;
            mesh.rotation.x = -Math.PI / 2; // Flat on the ground
            mesh.scale.x = mesh.scale.y = Math.random() * 2 + 1;
            scene.add( mesh );
        }

        // --- THE PLANE (Positioned in 3D space) ---
        // We are placing the 2D plane image as a sprite in 3D space
        const planeTexture = new THREE.TextureLoader().load('image_12.png'); // Use the source image
        const planeMaterial = new THREE.SpriteMaterial({ map: planeTexture });
        const qatarPlane = new THREE.Sprite(planeMaterial);
        
        qatarPlane.scale.set(15, 6, 1); // Maintain ratio
        qatarPlane.position.set(2, 4.5, -5); // Position it relative to the path
        scene.add(qatarPlane);

        // --- MOUSE TRACKING (For Parallax) ---
        let mouseX = 0; let mouseY = 0;
        let windowHalfX = window.innerWidth / 2; let windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime() * 0.8; // Time speed

            // 1. Animate the Sky Path (Jelly wave effect)
            for(let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const z = positions.getZ(i);
                // Create waves based on time, x, and z
                const wave = Math.sin(x * 0.4 + z * 0.3 + time) * 0.2;
                positions.setY(i, originalY[i] + wave);
            }
            skyPath.geometry.attributes.position.needsUpdate = true;

            // 2. Parallax effect: Camera subtle movement following mouse
            camera.position.x += (mouseX * 0.003 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 0.003 - camera.position.y) * 0.05;
            camera.lookAt(skyPath.position);

            // 3. Move the light along the path (Glowing pulse)
            pointLight.position.z = Math.sin(time) * 30 - 20;

            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize Glass Panel Tilt
        VanillaTilt.init(document.querySelectorAll(".glass-panel"), {
            max: 3,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });
    </script>
</body>
</html>
