---
layout: default
---
<section class="py-24 px-5 section-dark" style="min-height: 80vh;">
  <div class="max-w-3xl mx-auto">
    <div class="mb-12">
      <a href="{{ '/insights.html' | relative_url }}" class="nav-link" style="color: var(--holo-teal); text-transform: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem;"><i class="fa-solid fa-arrow-left"></i> Back to Insights</a>
      <h1 class="font-header text-3xl md:text-5xl font-bold text-white mt-6 mb-4">{{ page.title }}</h1>
      <p style="color: var(--text-dim); font-size: 0.9rem;">Published on {{ page.date | date: "%B %d, %Y" }} by {{ site.author }}</p>
      <div class="glow-line" style="margin: 2rem 0 0 0; auto: left;"></div>
    </div>

    <article style="color: var(--text-main); line-height: 1.8; font-size: 1.1rem; font-family: 'Nunito Sans', sans-serif;">
      {{ content }}
    </article>
  </div>
</section>
