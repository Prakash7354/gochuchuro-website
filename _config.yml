title: GoChuchuro
tagline: "Reach Your Peak. Automate Your Growth."
description: "UK Digital Growth Agency — smart websites, AI automation and coaching for UK small businesses and sole traders."
url: "https://gochuchuro.com"
baseurl: ""
author:
  name: "Prakash Gurung"
  email: "hello@gochuchuro.com"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /insights/:title/

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Prakash Gurung"
      image: "/logo-transparent.png"
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Sitemap settings
sitemap:
  exclude:
    - /privacy.html
    - /terms.html
